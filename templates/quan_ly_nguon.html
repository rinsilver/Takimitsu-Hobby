<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Nguồn Nhập - Wolves Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container mt-4">
        <div class="btn-group mb-4 shadow-sm w-100">
            <a href="/admin" class="btn btn-dark p-2">Kho hàng</a>
            <a href="/danh-muc" class="btn btn-outline-dark p-2">Danh mục</a>
            <a href="/admin/hang-sx" class="btn btn-outline-dark p-2">Hãng SX</a>
            <a href="/admin/nguon-nhap" class="btn btn-danger active p-2">🛡️ Nguồn nhập (Bí mật)</a>
            <a href="/admin/don-hang" class="btn btn-outline-dark p-2">Đơn khách</a>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card p-3 shadow-sm border-0 border-start border-danger border-4">
                    <h5 class="fw-bold text-danger">Thêm Nguồn Nhập Bí Mật</h5>
                    <p class="small text-muted italic">Thông tin này khách hàng sẽ không thấy.</p>
                    <form method="POST">
                        <input type="text" name="ten_nguon" class="form-control mb-2" placeholder="Ví dụ: Đại lý Japan, Web AmiAmi..." required>
                        <button class="btn btn-danger w-100 fw-bold">THÊM NGUỒN</button>
                    </form>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card border-0 shadow-sm text-center p-5">
                    <i class="fas fa-user-secret fa-3x text-danger mb-3"></i>
                    <h5 class="fw-bold">Danh sách nguồn nhập của sếp</h5>
                    <table class="table table-sm mt-3">
                        {% for n in nguons %}
                        <tr><td class="fw-bold">#{{ n.id }}</td><td>{{ n.ten_nguon }}</td></tr>
                        {% endfor %}
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
