<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Nguồn Nhập - V6 Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        .premium-card { border-radius: 15px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .nav-btn-group .btn { border-radius: 30px; font-weight: 600; padding: 10px 20px; }
        .border-secret { border-left: 5px solid #dc3545 !important; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="btn-group w-100 shadow-sm mb-4 nav-btn-group">
            <a href="/admin" class="btn btn-dark">📦 Kho hàng</a>
            <a href="/danh-muc" class="btn btn-outline-dark">📂 Danh mục</a>
            <a href="/admin/hang-sx" class="btn btn-outline-dark">🏭 Hãng SX</a>
            <a href="/admin/nguon-nhap" class="btn btn-danger active">🛡️ Nguồn (Bí mật)</a>
            <a href="/admin/don-hang" class="btn btn-outline-dark text-dark">🛒 Đơn khách</a>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card premium-card p-4 border-secret">
                    <h5 class="fw-bold mb-3 text-danger"><i class="fas fa-user-secret"></i> Nguồn Nhập Bí Mật</h5>
                    <p class="small text-muted mb-3">Dữ liệu này chỉ dành cho sếp quản lý, khách không bao giờ thấy.</p>
                    <form method="POST">
                        <input type="text" name="ten_nguon" class="form-control mb-3 rounded-pill" placeholder="Ví dụ: AmiAmi, Tokyo Otaku..." required>
                        <button class="btn btn-danger w-100 rounded-pill fw-bold shadow-sm">THÊM NGUỒN</button>
                    </form>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card premium-card overflow-hidden text-center p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-danger">
                            <tr>
                                <th class="ps-4">ID</th>
                                <th>Tên Đối Tác / Nguồn Nhập</th>
                                <th class="text-center">Thao Tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for n in nguons %}
                            <tr>
                                <td class="ps-4 text-muted">#{{ n.id }}</td>
                                <td class="fw-bold text-dark">{{ n.ten_nguon }}</td>
                                <td class="text-center">
                                    <form action="/xoa-nguon/{{ n.id }}" method="POST" class="m-0" onsubmit="return confirm('Xóa nguồn này sẽ mất dấu vết nhập hàng của sếp. Sếp chắc chứ?')">
                                        <button class="btn btn-sm btn-outline-danger rounded-pill px-3 fw-bold">
                                            <i class="fas fa-trash-alt"></i> Xóa
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
