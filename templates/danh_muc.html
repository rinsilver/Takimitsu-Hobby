<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Phân Loại</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 600px;">
        <h3 class="mb-4">⚙️ Quản Lý Phân Loại Sản Phẩm</h3>
        <a href="/admin" class="btn btn-outline-dark mb-4">🔙 Quay lại Admin</a>
        
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <form method="POST" class="d-flex gap-2">
                    <input type="text" name="ten_danh_muc" class="form-control" placeholder="Nhập tên loại mới (vd: Áo Khoác)" required>
                    <button type="submit" class="btn btn-success text-nowrap">Thêm Mới</button>
                </form>
            </div>
        </div>

        <table class="table table-bordered bg-white shadow-sm">
            <thead class="table-dark">
                <tr><th>ID</th><th>Tên Danh Mục</th><th>Thao Tác</th></tr>
            </thead>
            <tbody>
                {% for dm in danh_mucs %}
                <tr>
                    <td>{{ dm.id }}</td>
                    <td class="fw-bold">{{ dm.ten_danh_muc }}</td>
                    <td>
                        <form action="/xoa-danh-muc/{{ dm.id }}" method="POST" onsubmit="return confirm('Xóa phân loại này?');">
                            <button class="btn btn-danger btn-sm">Xóa</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
