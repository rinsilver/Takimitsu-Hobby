{% extends "admin_base.html" %}
{% set active_page = 'danh_muc' %}

{% block title %}Quản Lý Danh Mục{% endblock %}

{% block content %}
<div class="row mt-4">
    <div class="col-md-4">
        <div class="card premium-card p-4">
            <h5 class="fw-bold mb-3"><i class="fas fa-plus-circle text-primary"></i> Thêm Loại Mới</h5>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="text" name="ten_danh_muc" class="form-control mb-3 rounded-pill" placeholder="VD: Mô hình SHF..." required>
                <button class="btn btn-primary w-100 rounded-pill fw-bold">THÊM MỚI</button>
            </form>
        </div>
    </div>
    <div class="col-md-8">
        <div class="card premium-card overflow-hidden">
            <table class="table premium-table align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th class="ps-4">ID</th>
                        <th>Tên Phân Loại</th>
                        <th class="text-center">Thao Tác</th>
                    </tr>
                </thead>
                <tbody>
                    {% for dm in danh_mucs %}
                    <tr>
                        <td class="ps-4 text-muted">#{{ dm.id }}</td>
                        <td class="fw-bold">{{ dm.ten_danh_muc }}</td>
                        <td class="text-center">
                            <form action="/xoa-danh-muc/{{ dm.id }}" method="POST" onsubmit="return confirm('Xóa phân loại này sẽ làm trống các SP đang thuộc về nó. Sếp chắc chứ?')">
                                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                                <button class="btn btn-sm btn-outline-danger rounded-pill px-3"><i class="fas fa-trash"></i> Xóa</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
