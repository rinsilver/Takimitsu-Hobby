<!DOCTYPE html>
<html lang="vi">
<head><meta charset="UTF-8"><title>Đăng ký Tài Khoản</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow p-4" style="width: 450px;">
        <h3 class="text-center fw-bold mb-4 text-danger">ĐĂNG KÝ TÀI KHOẢN</h3>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3"><input type="text" name="tai_khoan" class="form-control" placeholder="Tên đăng nhập viết liền không dấu" required></div>
            <div class="mb-3"><input type="password" name="mat_khau" class="form-control" placeholder="Mật khẩu" required></div>
            <div class="mb-3"><input type="text" name="ho_ten" class="form-control" placeholder="Họ và tên của bạn" required></div>
            <div class="mb-3"><input type="text" name="sdt" class="form-control" placeholder="Số điện thoại" required></div>
            <div class="mb-3"><input type="text" name="dia_chi" class="form-control" placeholder="Địa chỉ giao hàng mặc định" required></div>
            <button type="submit" class="btn btn-danger w-100 fw-bold">TẠO TÀI KHOẢN</button>
        </form>
        <div class="text-center mt-3"><a href="/khach-dang-nhap" class="text-muted text-decoration-none">🔙 Quay lại Đăng nhập</a></div>
    </div>
</body>
</html>
