<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Hãng SX - Wolves Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container mt-4">
        <div class="btn-group mb-4 shadow-sm w-100">
            <a href="/admin" class="btn btn-dark p-2"><i class="fas fa-box"></i> Kho hàng</a>
            <a href="/danh-muc" class="btn btn-outline-dark p-2"><i class="fas fa-folder"></i> Danh mục</a>
            <a href="/admin/hang-sx" class="btn btn-primary active p-2">🏭 Hãng SX</a>
            <a href="/admin/nguon-nhap" class="btn btn-outline-danger p-2"><i class="fas fa-user-secret"></i> Nguồn (Bí mật)</a>
            <a href="/admin/don-hang" class="btn btn-outline-dark p-2"><i class="fas fa-shopping-cart"></i> Đơn khách</a>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card p-3 shadow-sm border-0">
                    <h5 class="fw-bold text-primary">Thêm Hãng Sản Xuất</h5>
                    <form method="POST">
                        <input type="text" name="ten_hang" class="form-control mb-2" placeholder="Ví dụ: Bandai, Hot Toys..." required>
                        <button class="btn btn-primary w-100 fw-bold">THÊM HÃNG</button>
                    </form>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card border-0 shadow-sm">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark"><tr><th>ID</th><th>Tên Hãng Sản Xuất</th></tr></thead>
                        <tbody>
                            {% for h in hangs %}
                            <tr><td>#{{ h.id }}</td><td class="fw-bold">{{ h.ten_hang }}</td></tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
