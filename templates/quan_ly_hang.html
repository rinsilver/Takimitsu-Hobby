<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Hãng SX - V6 Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        .premium-card { border-radius: 15px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .nav-btn-group .btn { border-radius: 30px; font-weight: 600; padding: 10px 20px; }
        .table thead { border-radius: 15px 15px 0 0; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="btn-group w-100 shadow-sm mb-4 nav-btn-group">
            <a href="/admin" class="btn btn-dark">📦 Kho hàng</a>
            <a href="/danh-muc" class="btn btn-outline-dark">📂 Danh mục</a>
            <a href="/admin/hang-sx" class="btn btn-primary active">🏭 Hãng SX</a>
            <a href="/admin/nguon-nhap" class="btn btn-outline-danger">🛡️ Nguồn (Bí mật)</a>
            <a href="/admin/don-hang" class="btn btn-outline-dark">🛒 Đơn khách</a>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card premium-card p-4">
                    <h5 class="fw-bold mb-3 text-primary"><i class="fas fa-industry"></i> Thêm Hãng Mới</h5>
                    <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <input type="text" name="ten_hang" class="form-control mb-3 rounded-pill" placeholder="Ví dụ: Bandai, Good Smile..." required>
                        <button class="btn btn-primary w-100 rounded-pill fw-bold shadow-sm">THÊM HÃNG</button>
                    </form>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card premium-card overflow-hidden">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th class="ps-4">ID</th>
                                <th>Tên Hãng Sản Xuất</th>
                                <th class="text-center">Thao Tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for h in hangs %}
                            <tr>
                                <td class="ps-4 text-muted">#{{ h.id }}</td>
                                <td class="fw-bold text-dark">{{ h.ten_hang }}</td>
                                <td class="text-center">
                                    <form action="/xoa-hang/{{ h.id }}" method="POST" class="m-0" onsubmit="return confirm('Sếp có chắc muốn xóa hãng này không?')">
                                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                                        <button class="btn btn-sm btn-outline-danger rounded-pill px-3 fw-bold">
                                            <i class="fas fa-trash-alt"></i> Xóa
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
