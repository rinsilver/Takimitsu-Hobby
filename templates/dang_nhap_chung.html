<!DOCTYPE html>
<html lang="vi">
<head><meta charset="UTF-8"><title>Đăng nhập Hệ thống</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow p-4" style="width: 400px;">
        <h3 class="text-center fw-bold mb-4">WOLVES CLONE</h3>
        <p class="text-center text-muted">Vui lòng đăng nhập để tiếp tục</p>
        
        <form method="POST">
            <div class="mb-3"><input type="text" name="tai_khoan" class="form-control" placeholder="Tên đăng nhập" required></div>
            <div class="mb-3"><input type="password" name="mat_khau" class="form-control" placeholder="Mật khẩu" required></div>
            <button type="submit" class="btn btn-dark w-100 fw-bold py-2">ĐĂNG NHẬP</button>
        </form>
        
        <div class="text-center mt-3">
            <p>Khách hàng mới? <a href="/dang-ky" class="text-danger fw-bold">Tạo tài khoản</a></p>
            <a href="/" class="text-muted text-decoration-none">🔙 Về trang chủ</a>
        </div>
    </div>
</body>
</html>
