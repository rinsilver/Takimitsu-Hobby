<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Wolves Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow-sm p-4" style="width: 380px; border-radius: 15px;">
        <h3 class="text-center fw-bold mb-4">WOLVES CLONE</h3>
        <form method="POST" action="/dang-nhap">
            <div class="mb-3">
                <label class="form-label small fw-bold">Tài khoản</label>
                <input type="text" name="tai_khoan" class="form-control" placeholder="admin hoặc tên khách" required>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Mật khẩu</label>
                <input type="password" name="mat_khau" class="form-control" placeholder="******" required>
            </div>
            <button type="submit" class="btn btn-dark w-100 fw-bold py-2 mb-3">ĐĂNG NHẬP</button>
        </form>
        <div class="text-center">
            <p class="small mb-1">Chưa có tài khoản? <a href="/dang-ky" class="text-danger fw-bold text-decoration-none">Đăng ký ngay</a></p>
            <a href="/" class="text-muted small text-decoration-none">🔙 Quay lại trang chủ</a>
        </div>
    </div>
</body>
</html>
