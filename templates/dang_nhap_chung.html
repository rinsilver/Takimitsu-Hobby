{% extends "base.html" %}

{% block title %}Đăng nhập - {{ settings.ten_web }}{% endblock %}

{% block extra_css %}
<style>
    /* CSS RIÊNG ĐỂ CĂN GIỮA CARD ĐĂNG NHẬP */
    .login-wrapper {
        min-height: 60vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 50px 0;
    }
    
    .login-card {
        width: 100%;
        max-width: 400px;
        padding: 40px;
        border-radius: 20px;
        border: 1px solid #eee;
        background: #fff;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    .form-control {
        border-radius: 10px;
        padding: 12px 15px;
        border: 1px solid #ddd;
        transition: 0.3s;
    }

    .form-control:focus {
        border-color: var(--main-color);
        box-shadow: none;
    }

    .btn-login {
        background-color: #111;
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 12px;
        font-weight: 700;
        transition: 0.3s;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .btn-login:hover {
        background-color: var(--main-color);
        color: #fff;
    }
</style>
{% endblock %}

{% block content %}
<div class="container login-wrapper">
    <div class="login-card">
        <h3 class="text-center fw-bold mb-4" style="letter-spacing: 1px; color: #111;">
            {{ settings.ten_web | upper }}
        </h3>
        
        <form method="POST" action="/dang-nhap">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted text-uppercase">Tài khoản</label>
                <input type="text" name="tai_khoan" class="form-control" placeholder="admin hoặc tên khách" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-muted text-uppercase">Mật khẩu</label>
                <input type="password" name="mat_khau" class="form-control" placeholder="******" required>
            </div>
            <button type="submit" class="btn btn-login w-100 mb-3">Đăng nhập</button>
        </form>

        <div class="text-center mt-3">
            <a href="/" class="text-muted small text-decoration-none">
                <i class="fas fa-arrow-left me-1"></i> Quay lại trang chủ
            </a>
        </div>
    </div>
</div>
{% endblock %}
